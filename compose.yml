volumes:
  dvwa:

networks:
  dvwa:

services:
  dvwa:
    build: .
    image: ghcr.io/digininja/dvwa:latest
    # Change `always` to `build` to build from local source
    pull_policy: always
    environment:
      - DB_SERVER=db
    depends_on:
      - db
    # Uncomment the next 2 lines to serve local source
    # volumes:
    #   - ./:/var/www/html
    networks:
      - dvwa
    ports:
      - 127.0.0.1:4280:80
    restart: unless-stopped

  db:
    image: docker.io/library/mariadb:10
    environment:
      # Do NOT hardcode secrets in source. Set these in a local .env file,
      # CI secrets, or Docker secrets.
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?set in .env}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-dvwa}
      - MYSQL_USER=${MYSQL_USER:-dvwa}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?set in .env}
    volumes:
      - dvwa:/var/lib/mysql
    networks:
      - dvwa
    restart: unless-stopped
